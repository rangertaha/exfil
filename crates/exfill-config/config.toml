# exfill default configuration (TOML).
#
# Each plugin is configured by a [plugins.<name>] table whose fields are
# specific to that plugin. `update` entries list datasets (and the LLM model)
# to (re)download when `exfill pull` runs (no argument = pull all entries).

# Location of the local findings store (removed by `exfill clean`).
store = ".exfill"

[plugins.regex]
# Datasets to apply. Empty = all stored, falling back to the built-in set.
datasets = []

[plugins.ast]
# Languages parsed for structural analysis (auto-detected by extension).
languages = [
  "python", "javascript", "typescript", "csharp", "rust", "go", "c", "cpp",
  "java", "bash", "lua", "powershell", "ruby", "dart", "swift", "kotlin",
  "groovy",
]

[plugins.yara]
# YARA rule files or directories.
rules = []

[plugins.clamav]
# ClamAV-format signature files (.hdb/.hsb hash sigs, .ndb literal body sigs).
signatures = []

[plugins.script]
# A Rhai script that computes a triage note per finding (`exfill enrich`).
# The script sees `finding` (rule/path/line/severity/cwe/snippet) and returns
# a string note or () to skip. Empty = use the built-in rule-based enricher.
# enrich = "enrich.rhai"

[plugins.taint]
enabled = true

[llm]
# Offline LLM enrichment. No-op until a model is downloaded via `exfill update`.
enabled = false
tasks = ["extract", "triage"]

# Remap the graph navigator's keys (vim defaults otherwise). Each entry is
# `key = "Action"`; actions: Up, Down, Ascend, Descend, Back, Forward, Edit,
# DeleteEdge, Undo, Redo, Quit.
# [keymap.nav]
# x = "Edit"

[[update]]
name = "security"
ref = "builtin://security"
