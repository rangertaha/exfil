name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p exfil-cli

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.os }}" == windows-latest ]]; then
            7z a ../../../exfil-${{ matrix.target }}.zip exfil.exe
          else
            tar czf ../../../exfil-${{ matrix.target }}.tar.gz exfil
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            exfil-*.tar.gz
            exfil-*.zip
